# backend/docker-compose.yml
version: '3.8'

services:
  pdf-backend:
    build: .
    container_name: pdflab-backend
    ports:
      - "8000:8000"
    volumes:
      - ./temp_files:/app/temp_files
      - ./uploads:/app/uploads
    environment:
      - MAX_FILE_SIZE=100MB
      - CLEANUP_HOURS=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/tools/health"]
      interval: 30s
      timeout: 10s
      retries: 3
